<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Skills Benchmark Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --green-bg: #0d2818;
    --red: #f85149;
    --red-bg: #2d1214;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .meta { font-size: 12px; color: var(--muted); margin-left: auto; }
  .tabs {
    display: flex;
    gap: 2px;
    margin-left: 24px;
  }
  .tab-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px 6px 0 0;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active { background: var(--surface); color: var(--text); border-bottom-color: var(--surface); }
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* Results tab */
  .layout { display: flex; flex: 1; overflow: hidden; }
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background 0.1s;
  }
  .sidebar-item:hover { background: var(--surface); }
  .sidebar-item.active { background: var(--surface); border-left: 3px solid var(--blue); }
  .sidebar-item .name { font-weight: 500; }
  .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge.good { background: var(--green-bg); color: var(--green); }
  .badge.mid { background: #2e1f0f; color: var(--yellow); }
  .badge.bad { background: var(--red-bg); color: var(--red); }
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
  }
  .skill-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .skill-header h2 { font-size: 18px; }
  .stats { display: flex; gap: 24px; margin-bottom: 24px; font-size: 13px; }
  .stat-label { color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .case { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 16px; overflow: hidden; }
  .case-header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .case-header:hover { filter: brightness(1.1); }
  .case-id { font-weight: 600; font-size: 13px; }
  .case-scores { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .delta-zero { color: var(--yellow); }
  .case-body { display: none; }
  .case-body.open { display: block; }
  .prompt-row { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .prompt-label { color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .prompt-text { white-space: pre-wrap; font-family: monospace; font-size: 12px; color: var(--text); }
  .diff-container { display: grid; grid-template-columns: 1fr 1fr; }
  .diff-pane { padding: 0; overflow: hidden; }
  .diff-pane-header {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .diff-pane:first-child { border-right: 1px solid var(--border); }
  .diff-pane:first-child .diff-pane-header { background: var(--red-bg); color: var(--red); }
  .diff-pane:last-child .diff-pane-header { background: var(--green-bg); color: var(--green); }
  .diff-content {
    padding: 12px 16px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
    max-height: 400px;
    overflow-y: auto;
  }
  .assertions { padding: 10px 16px; border-top: 1px solid var(--border); font-size: 12px; }
  .assertion { margin: 2px 0; }
  .assertion.pass { color: var(--green); }
  .assertion.fail { color: var(--red); }
  .no-response { color: var(--muted); font-style: italic; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); }
  #error-banner {
    display: none;
    padding: 12px 20px;
    background: var(--red-bg);
    color: var(--red);
    font-size: 13px;
    border-bottom: 1px solid var(--red);
  }

  /* Run tab */
  .run-layout { display: flex; flex: 1; overflow: hidden; }
  .run-sidebar {
    width: 360px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    flex-shrink: 0;
  }
  .run-main { flex: 1; overflow-y: auto; padding: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group select,
  .form-group input[type="text"],
  .form-group input[type="password"],
  .form-group input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .form-group select[multiple] { height: 140px; }
  .form-group small { display: block; margin-top: 4px; color: var(--muted); font-size: 11px; }
  .btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
  }
  .btn:hover { filter: brightness(1.2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-danger { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-title:not(:first-child) { margin-top: 24px; }
  .cred-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .cred-source { font-size: 11px; color: var(--muted); }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--surface);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    transition: width 0.3s;
    width: 0%;
  }
  .progress-log {
    font-family: monospace;
    font-size: 12px;
    line-height: 1.8;
    max-height: 600px;
    overflow-y: auto;
  }
  .log-entry { padding: 2px 0; }
  .log-entry.error { color: var(--red); }
  .log-entry.success { color: var(--green); }
  .log-entry.info { color: var(--blue); }
  .add-key-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-key-row select { width: 120px; }
  .add-key-row input { flex: 1; }
</style>
</head>
<body>

<div id="error-banner"></div>

<header>
  <h1>Agent Skills Benchmark</h1>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="results">Results</button>
    <button class="tab-btn" data-tab="run" id="run-tab-btn" style="display:none">Run</button>
  </nav>
  <span class="meta" id="run-meta"></span>
</header>

<!-- Results Tab -->
<div class="tab-content active" id="tab-results">
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="loading">Loading...</div>
    </div>
    <div class="main" id="main">
      <div class="empty">Select a skill from the sidebar</div>
    </div>
  </div>
</div>

<!-- Run Tab -->
<div class="tab-content" id="tab-run">
  <div class="run-layout">
    <div class="run-sidebar">
      <div class="section-title">Run Configuration</div>
      <div class="form-group">
        <label>Provider</label>
        <select id="provider-select"><option value="">Loading...</option></select>
      </div>
      <div class="form-group">
        <label>Model (optional override)</label>
        <input type="text" id="model-input" placeholder="Leave blank for default">
      </div>
      <div class="form-group">
        <label>Skills</label>
        <select id="skills-select" multiple></select>
        <small>Ctrl/Cmd+click to multi-select. Empty = run all.</small>
      </div>
      <div class="form-group">
        <label>Tier</label>
        <select id="tier-select">
          <option value="minimal">Minimal</option>
          <option value="standard" selected>Standard</option>
          <option value="comprehensive">Comprehensive</option>
        </select>
      </div>
      <div class="form-group">
        <label>Runs per case</label>
        <input type="number" id="runs-input" min="1" max="10" value="1">
      </div>
      <button class="btn btn-primary" id="run-btn" disabled>Run Benchmarks</button>

      <div class="section-title">API Keys</div>
      <div id="cred-list"></div>
      <div class="add-key-row">
        <select id="cred-provider-select"></select>
        <input type="password" id="cred-key-input" placeholder="API key">
        <button class="btn btn-sm" id="cred-save-btn">Save</button>
      </div>
    </div>
    <div class="run-main">
      <div id="run-progress-area">
        <div class="empty">Configure and start a benchmark run</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);

let summaryData = null;
let skillCache = {};
let providersData = [];

// --- Tabs ---
if (isLocalhost) {
  document.getElementById('run-tab-btn').style.display = '';
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- Helpers ---
function scoreBadge(score) {
  const cls = score >= 7 ? 'good' : score >= 4 ? 'mid' : 'bad';
  return `<span class="badge ${cls}">${score}/10</span>`;
}
function deltaClass(d) {
  if (d > 0.05) return 'delta-pos';
  if (d < -0.05) return 'delta-neg';
  return 'delta-zero';
}
function fmtDelta(d) {
  const sign = d >= 0 ? '+' : '';
  return `${sign}${d.toFixed(2)}`;
}
function pct(v) { return `${(v * 100).toFixed(1)}%`; }
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function showError(msg) {
  const banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = 'block';
}

// --- Results Tab ---
async function loadSummary() {
  try {
    const res = await fetch(`${API}/api/summary`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    summaryData = await res.json();
    skillCache = {};
    renderSidebar();
  } catch (e) {
    showError(`Could not load results. Run benchmarks first. (${e.message})`);
  }
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const meta = document.getElementById('run-meta');

  if (summaryData.metadata) {
    const m = summaryData.metadata;
    meta.textContent = `${m.provider} / ${m.model} | ${m.tier} tier | ${(m.timestamp || '').split('T')[0]}`;
  }

  const sorted = [...summaryData.results].sort(
    (a, b) => (b.effectivenessScore?.total || 0) - (a.effectivenessScore?.total || 0)
  );

  el.innerHTML = sorted.map(r => `
    <div class="sidebar-item" data-skill="${r.skill}">
      <span class="name">${r.skill}</span>
      ${scoreBadge(r.effectivenessScore?.total || 0)}
    </div>
  `).join('');

  el.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => selectSkill(item.dataset.skill));
  });
}

async function selectSkill(skillName) {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.skill === skillName);
  });

  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  try {
    if (!skillCache[skillName]) {
      const res = await fetch(`${API}/api/skills/${encodeURIComponent(skillName)}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      skillCache[skillName] = await res.json();
    }
    renderSkill(skillCache[skillName]);
  } catch (e) {
    main.innerHTML = `<div class="empty">Failed to load ${skillName}: ${e.message}</div>`;
  }
}

function renderSkill(data) {
  const main = document.getElementById('main');
  const s = data.summary;
  const score = data.effectivenessScore;

  let html = `
    <div class="skill-header">
      <h2>${data.skill}</h2>
      ${scoreBadge(score?.total || 0)}
    </div>
    <div class="stats">
      <div><div class="stat-label">Baseline</div><div class="stat-value">${pct(s.baselinePassRate)}</div></div>
      <div><div class="stat-label">With Skill</div><div class="stat-value">${pct(s.withSkillPassRate)}</div></div>
      <div><div class="stat-label">Avg Delta</div><div class="stat-value ${deltaClass(s.avgDelta)}">${fmtDelta(s.avgDelta)}</div></div>
      <div><div class="stat-label">Cases</div><div class="stat-value">${s.totalCases}</div></div>
    </div>
  `;

  for (const c of (data.cases || [])) {
    const baseResp = c.baseline?.response;
    const skillResp = c.withSkill?.response;

    html += `
      <div class="case">
        <div class="case-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="case-id">${escHtml(c.id)}</span>
          <div class="case-scores">
            <span>baseline: ${c.baseline.score.toFixed(2)}</span>
            <span>skill: ${c.withSkill.score.toFixed(2)}</span>
            <span class="${deltaClass(c.delta)}">&#916; ${fmtDelta(c.delta)}</span>
          </div>
        </div>
        <div class="case-body">
          <div class="prompt-row">
            <div class="prompt-label">Prompt</div>
            <div class="prompt-text">${escHtml(c.prompt)}</div>
          </div>
          <div class="diff-container">
            <div class="diff-pane">
              <div class="diff-pane-header">Baseline (no system prompt)</div>
              <div class="diff-content">${baseResp ? escHtml(baseResp) : '<span class="no-response">No response captured</span>'}</div>
            </div>
            <div class="diff-pane">
              <div class="diff-pane-header">With Skill</div>
              <div class="diff-content">${skillResp ? escHtml(skillResp) : '<span class="no-response">No response captured</span>'}</div>
            </div>
          </div>
          ${buildAssertions(c)}
        </div>
      </div>
    `;
  }

  main.innerHTML = html;
}

function buildAssertions(c) {
  const baselineFails = new Set(c.baseline.failures || []);
  const skillFails = new Set(c.withSkill.failures || []);
  const allFails = new Set([...baselineFails, ...skillFails]);

  if (allFails.size === 0 && c.baseline.passed && c.withSkill.passed) {
    return '<div class="assertions"><span class="assertion pass">All assertions passed</span></div>';
  }

  let html = '<div class="assertions">';
  if (c.withSkill.failures?.length > 0) {
    for (const f of c.withSkill.failures) {
      html += `<div class="assertion fail">&#10007; ${escHtml(f)}</div>`;
    }
  }
  for (const f of baselineFails) {
    if (!skillFails.has(f)) {
      html += `<div class="assertion pass">&#10003; ${escHtml(f)} (fixed by skill)</div>`;
    }
  }
  if (c.withSkill.passed) {
    html += '<div class="assertion pass">All skill assertions passed</div>';
  }
  html += '</div>';
  return html;
}

// --- Run Tab ---
async function loadProviders() {
  try {
    const res = await fetch(`${API}/api/providers`);
    providersData = await res.json();
    renderProviderSelect();
    renderCredentials();
  } catch { /* non-fatal */ }
}

async function loadSkillsList() {
  try {
    const res = await fetch(`${API}/api/skills-list`);
    const data = await res.json();
    const sel = document.getElementById('skills-select');
    sel.innerHTML = data.testableSkills.map(s =>
      `<option value="${s}">${s}</option>`
    ).join('');
  } catch { /* non-fatal */ }
}

function renderProviderSelect() {
  const sel = document.getElementById('provider-select');
  const available = providersData.filter(p => p.available);
  sel.innerHTML = available.length === 0
    ? '<option value="">No providers available - add an API key below</option>'
    : available.map(p => `<option value="${p.name}">${p.displayName} (${p.defaultModel})</option>`).join('');
  document.getElementById('run-btn').disabled = available.length === 0;

  const credSel = document.getElementById('cred-provider-select');
  credSel.innerHTML = providersData.map(p =>
    `<option value="${p.name}">${p.displayName}</option>`
  ).join('');
}

function renderCredentials() {
  const el = document.getElementById('cred-list');
  el.innerHTML = providersData.map(p => {
    const status = p.source === 'env'
      ? '<span class="cred-source" style="color:var(--green)">env</span>'
      : p.source === 'db'
        ? '<span class="cred-source" style="color:var(--blue)">stored</span>'
        : '<span class="cred-source">not set</span>';
    const removeBtn = p.source === 'db'
      ? `<button class="btn btn-danger btn-sm" onclick="removeCred('${p.name}')">Remove</button>`
      : '';
    return `<div class="cred-row"><span>${p.displayName} ${status}</span>${removeBtn}</div>`;
  }).join('');
}

document.getElementById('cred-save-btn').addEventListener('click', async () => {
  const provider = document.getElementById('cred-provider-select').value;
  const apiKey = document.getElementById('cred-key-input').value.trim();
  if (!provider || !apiKey) return;

  try {
    const res = await fetch(`${API}/api/credentials`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, apiKey }),
    });
    if (!res.ok) throw new Error((await res.json()).error);
    document.getElementById('cred-key-input').value = '';
    await loadProviders();
  } catch (e) {
    alert('Failed to save key: ' + e.message);
  }
});

async function removeCred(provider) {
  try {
    await fetch(`${API}/api/credentials/${provider}`, { method: 'DELETE' });
    await loadProviders();
  } catch { /* ignore */ }
}

// Run button
document.getElementById('run-btn').addEventListener('click', startRun);

async function startRun() {
  const provider = document.getElementById('provider-select').value;
  const model = document.getElementById('model-input').value.trim() || undefined;
  const skillsSel = document.getElementById('skills-select');
  const skills = Array.from(skillsSel.selectedOptions).map(o => o.value);
  const tier = document.getElementById('tier-select').value;
  const runs = parseInt(document.getElementById('runs-input').value) || 1;

  if (!provider) return;

  const runBtn = document.getElementById('run-btn');
  runBtn.disabled = true;
  runBtn.textContent = 'Running...';

  const area = document.getElementById('run-progress-area');
  area.innerHTML = `
    <div class="section-title">Run Progress</div>
    <div class="progress-bar"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-log" id="plog"></div>
  `;

  function appendLog(msg, cls = '') {
    const log = document.getElementById('plog');
    const div = document.createElement('div');
    div.className = 'log-entry' + (cls ? ' ' + cls : '');
    div.textContent = msg;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function setProgress(current, total) {
    const pbar = document.getElementById('pbar');
    if (pbar) pbar.style.width = `${(current / total) * 100}%`;
  }

  try {
    const res = await fetch(`${API}/api/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, model, skills, tier, runs }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    appendLog(`Run #${data.runId} started`, 'info');

    const es = new EventSource(`${API}/api/run/${data.runId}/progress`);

    es.addEventListener('skill:start', (e) => {
      const d = JSON.parse(e.data);
      appendLog(`[${d.index + 1}/${d.total}] Running ${d.skill}...`);
      setProgress(d.index, d.total);
    });

    es.addEventListener('skill:complete', (e) => {
      const d = JSON.parse(e.data);
      appendLog(
        `[${d.index + 1}/${d.total}] ${d.skill} \u2014 score: ${d.score.total}/10, delta: ${fmtDelta(d.summary.avgDelta)}`,
        'success'
      );
      setProgress(d.index + 1, d.total);
    });

    es.addEventListener('skill:error', (e) => {
      const d = JSON.parse(e.data);
      appendLog(`[${d.index + 1}/${d.total}] ${d.skill} \u2014 ERROR: ${d.error}`, 'error');
    });

    es.addEventListener('run:complete', (e) => {
      es.close();
      const d = JSON.parse(e.data);
      appendLog(`Run complete! ${d.skillsBenchmarked} skills benchmarked.`, 'success');
      setProgress(1, 1);
      runBtn.disabled = false;
      runBtn.textContent = 'Run Benchmarks';
      loadSummary();
    });

    es.addEventListener('run:error', (e) => {
      es.close();
      const d = JSON.parse(e.data);
      appendLog(`Run failed: ${d.error}`, 'error');
      runBtn.disabled = false;
      runBtn.textContent = 'Run Benchmarks';
    });

    es.onerror = () => {
      es.close();
      appendLog('Connection lost', 'error');
      runBtn.disabled = false;
      runBtn.textContent = 'Run Benchmarks';
    };
  } catch (e) {
    appendLog('Failed to start run: ' + e.message, 'error');
    runBtn.disabled = false;
    runBtn.textContent = 'Run Benchmarks';
  }
}

// --- Init ---
loadSummary();
if (isLocalhost) {
  loadProviders();
  loadSkillsList();
}
</script>
</body>
</html>
