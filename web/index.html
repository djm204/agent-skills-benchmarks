<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Skills Benchmark Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --green-bg: #0d2818;
    --red: #f85149;
    --red-bg: #2d1214;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .meta { font-size: 12px; color: var(--muted); }
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .sidebar {
    width: 260px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    transition: background 0.1s;
  }
  .sidebar-item:hover { background: var(--surface); }
  .sidebar-item.active { background: var(--surface); border-left: 3px solid var(--blue); }
  .sidebar-item .name { font-weight: 500; }
  .badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge.good { background: var(--green-bg); color: var(--green); }
  .badge.mid { background: #2e1f0f; color: var(--yellow); }
  .badge.bad { background: var(--red-bg); color: var(--red); }
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
  }
  .skill-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .skill-header h2 { font-size: 18px; }
  .stats {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .stat-label { color: var(--muted); margin-bottom: 2px; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .case {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .case-header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .case-header:hover { filter: brightness(1.1); }
  .case-id { font-weight: 600; font-size: 13px; }
  .case-scores { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .delta-zero { color: var(--yellow); }
  .case-body { display: none; }
  .case-body.open { display: block; }
  .prompt-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .prompt-label { color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .prompt-text { white-space: pre-wrap; font-family: monospace; font-size: 12px; color: var(--text); }
  .diff-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .diff-pane {
    padding: 0;
    overflow: hidden;
  }
  .diff-pane-header {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .diff-pane:first-child { border-right: 1px solid var(--border); }
  .diff-pane:first-child .diff-pane-header { background: var(--red-bg); color: var(--red); }
  .diff-pane:last-child .diff-pane-header { background: var(--green-bg); color: var(--green); }
  .diff-content {
    padding: 12px 16px;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 60px;
    max-height: 400px;
    overflow-y: auto;
  }
  .assertions {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .assertion { margin: 2px 0; }
  .assertion.pass { color: var(--green); }
  .assertion.fail { color: var(--red); }
  .no-response { color: var(--muted); font-style: italic; }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
  }
  #error-banner {
    display: none;
    padding: 12px 20px;
    background: var(--red-bg);
    color: var(--red);
    font-size: 13px;
    border-bottom: 1px solid var(--red);
  }
</style>
</head>
<body>

<div id="error-banner"></div>

<header>
  <h1>Agent Skills Benchmark Viewer</h1>
  <span class="meta" id="run-meta"></span>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="loading">Loading...</div>
  </div>
  <div class="main" id="main">
    <div class="empty">Select a skill from the sidebar</div>
  </div>
</div>

<script>
const RESULTS_BASE = '../results';
let summaryData = null;
let skillCache = {};

function scoreBadge(score) {
  const cls = score >= 7 ? 'good' : score >= 4 ? 'mid' : 'bad';
  return `<span class="badge ${cls}">${score}/10</span>`;
}

function deltaClass(d) {
  if (d > 0.05) return 'delta-pos';
  if (d < -0.05) return 'delta-neg';
  return 'delta-zero';
}

function fmtDelta(d) {
  const sign = d >= 0 ? '+' : '';
  return `${sign}${d.toFixed(2)}`;
}

function pct(v) { return `${(v * 100).toFixed(1)}%`; }

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function loadSummary() {
  try {
    const res = await fetch(`${RESULTS_BASE}/summary.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    summaryData = await res.json();
    renderSidebar();
  } catch (e) {
    showError(`Could not load results. Run benchmarks first: npm run benchmark. (${e.message})`);
  }
}

function showError(msg) {
  const banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = 'block';
}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const meta = document.getElementById('run-meta');

  if (summaryData.metadata) {
    const m = summaryData.metadata;
    meta.textContent = `${m.provider} / ${m.model} | ${m.tier} tier | ${m.timestamp?.split('T')[0] || ''}`;
  }

  const sorted = [...summaryData.results].sort(
    (a, b) => (b.effectivenessScore?.total || 0) - (a.effectivenessScore?.total || 0)
  );

  el.innerHTML = sorted.map(r => `
    <div class="sidebar-item" data-skill="${r.skill}">
      <span class="name">${r.skill}</span>
      ${scoreBadge(r.effectivenessScore?.total || 0)}
    </div>
  `).join('');

  el.querySelectorAll('.sidebar-item').forEach(item => {
    item.addEventListener('click', () => selectSkill(item.dataset.skill));
  });
}

async function selectSkill(skillName) {
  document.querySelectorAll('.sidebar-item').forEach(el => {
    el.classList.toggle('active', el.dataset.skill === skillName);
  });

  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">Loading...</div>';

  try {
    if (!skillCache[skillName]) {
      const res = await fetch(`${RESULTS_BASE}/${skillName}/result.json`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      skillCache[skillName] = await res.json();
    }
    renderSkill(skillCache[skillName]);
  } catch (e) {
    main.innerHTML = `<div class="empty">Failed to load ${skillName}: ${e.message}</div>`;
  }
}

function renderSkill(data) {
  const main = document.getElementById('main');
  const s = data.summary;
  const score = data.effectivenessScore;

  let html = `
    <div class="skill-header">
      <h2>${data.skill}</h2>
      ${scoreBadge(score?.total || 0)}
    </div>
    <div class="stats">
      <div><div class="stat-label">Baseline</div><div class="stat-value">${pct(s.baselinePassRate)}</div></div>
      <div><div class="stat-label">With Skill</div><div class="stat-value">${pct(s.withSkillPassRate)}</div></div>
      <div><div class="stat-label">Avg Delta</div><div class="stat-value ${deltaClass(s.avgDelta)}">${fmtDelta(s.avgDelta)}</div></div>
      <div><div class="stat-label">Cases</div><div class="stat-value">${s.totalCases}</div></div>
    </div>
  `;

  for (const c of data.cases) {
    const baseResp = c.baseline?.response;
    const skillResp = c.withSkill?.response;
    const allAssertions = buildAssertions(c);

    html += `
      <div class="case">
        <div class="case-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="case-id">${escHtml(c.id)}</span>
          <div class="case-scores">
            <span>baseline: ${c.baseline.score.toFixed(2)}</span>
            <span>skill: ${c.withSkill.score.toFixed(2)}</span>
            <span class="${deltaClass(c.delta)}">Δ ${fmtDelta(c.delta)}</span>
          </div>
        </div>
        <div class="case-body">
          <div class="prompt-row">
            <div class="prompt-label">Prompt</div>
            <div class="prompt-text">${escHtml(c.prompt)}</div>
          </div>
          <div class="diff-container">
            <div class="diff-pane">
              <div class="diff-pane-header">Baseline (no system prompt)</div>
              <div class="diff-content">${baseResp ? escHtml(baseResp) : '<span class="no-response">No response captured</span>'}</div>
            </div>
            <div class="diff-pane">
              <div class="diff-pane-header">With Skill</div>
              <div class="diff-content">${skillResp ? escHtml(skillResp) : '<span class="no-response">No response captured</span>'}</div>
            </div>
          </div>
          ${allAssertions}
        </div>
      </div>
    `;
  }

  main.innerHTML = html;
}

function buildAssertions(c) {
  const baselineFails = new Set(c.baseline.failures || []);
  const skillFails = new Set(c.withSkill.failures || []);

  // Merge all unique failure messages to show what was checked
  const allFails = new Set([...baselineFails, ...skillFails]);
  if (allFails.size === 0 && c.baseline.passed && c.withSkill.passed) {
    return '<div class="assertions"><span class="assertion pass">All assertions passed</span></div>';
  }

  let html = '<div class="assertions">';

  // Show skill-side assertion results
  if (c.withSkill.failures?.length > 0) {
    for (const f of c.withSkill.failures) {
      html += `<div class="assertion fail">✗ ${escHtml(f)}</div>`;
    }
  }

  // Failures that baseline had but skill fixed
  for (const f of baselineFails) {
    if (!skillFails.has(f)) {
      html += `<div class="assertion pass">✓ ${escHtml(f)} (fixed by skill)</div>`;
    }
  }

  if (c.withSkill.passed) {
    html += `<div class="assertion pass">All skill assertions passed</div>`;
  }

  html += '</div>';
  return html;
}

loadSummary();
</script>
</body>
</html>
